<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shree Balaji Medical Store</title>
    <style>
        :root { --bg: #f8fafc; --text: #0f172a; --card: #ffffff; --border: #e2e8f0; --primary: #0284c7; }
        [data-theme="dark"] { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --border: #334155; --primary: #38bdf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 30px; width: 100%; max-width: 500px; margin-top: 20px; text-align: center; }
        .hidden { display: none !important; }
        input, button { width: 100%; padding: 14px; border-radius: 8px; font-size: 1rem; margin-bottom: 15px; outline: none; border: 2px solid var(--border); background: var(--card); color: var(--text); }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        #status-banner { font-size: 1.2rem; font-weight: bold; padding: 15px; border-radius: 8px; background: #fef08a; color: #854d0e; margin-bottom: 20px; }
        #drop-zone { border: 2px dashed var(--border); padding: 20px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; color: gray; }
    </style>
</head>
<body>

    <header style="width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="color: var(--primary);">Shree Balaji</h1>
        <button id="theme-btn" style="width: auto; padding: 8px 15px;">🌙</button>
    </header>

    <div id="order-panel" class="card">
        <h2>Place Your Order</h2>
        <input type="tel" id="mobile" placeholder="Mobile Number (+91...)" maxlength="10">
        <input type="text" id="medicines" placeholder="Type medicines (e.g., Aspirin x2)...">
        
        <p style="margin: 10px 0; color: gray;">- OR -</p>
        
        <div id="drop-zone">Click to Upload Prescription Image</div>
        <input type="file" id="file-input" class="hidden" accept="image/*">
        
        <button id="submit-btn">Submit Order Instantly</button>
    </div>

    <div id="tracking-panel" class="card hidden">
        <div id="status-banner">Status: Pending...</div>
        <p style="color: gray;">Do not close this page. We are reviewing your order live.</p>
        <button id="new-order-btn" class="hidden" style="margin-top: 20px;" onclick="location.reload()">Place New Order</button>
    </div>

    <script type="module">
        // --- 1. FIREBASE & API SETUP (PASTE YOUR KEYS HERE) ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            // 🔴 PASTE YOUR EXACT FIREBASE CONFIG OBJECT HERE:
        const firebaseConfig = {
            apiKey: "AIzaSyBcNh75Xk9kr9Ri0zim92I3PilHdjDM07w",
            authDomain: "shree-balaji-pharma.firebaseapp.com",
            databaseURL: "https://shree-balaji-pharma-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "shree-balaji-pharma",
            storageBucket: "shree-balaji-pharma.firebasestorage.app",
            messagingSenderId: "626851982771",
            appId: "1:626851982771:web:e356909d266bd34099efc6"
        };
        const IMGBB_API_KEY = "23bb1575c185e8c11f3a4f5a50dea3f5"; // 🔴 PASTE IMGBB KEY HERE

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 2. FRONTEND LOGIC ---
        let selectedFile = null;
        document.getElementById('drop-zone').addEventListener('click', () => document.getElementById('file-input').click());
        document.getElementById('file-input').addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            document.getElementById('drop-zone').innerText = `📄 ${selectedFile.name}`;
            document.getElementById('drop-zone').style.borderColor = "var(--primary)";
        });

        // --- 3. SUBMIT & UPLOAD LOGIC ---
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const phone = document.getElementById('mobile').value.trim();
            const meds = document.getElementById('medicines').value.trim();

            if (phone.length < 10) return alert("Enter valid 10-digit mobile number.");
            if (!meds && !selectedFile) return alert("Enter medicines or upload a prescription.");

            document.getElementById('submit-btn').innerText = "Processing... Please wait.";
            document.getElementById('submit-btn').disabled = true;

            let imageUrl = null;

            // If image exists, send to ImgBB
            if (selectedFile) {
                const formData = new FormData();
                formData.append("image", selectedFile);
                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const data = await res.json();
                    imageUrl = data.data.url; // We got the clean URL!
                } catch (e) {
                    alert("Image upload failed. Try again.");
                    return;
                }
            }

            // Push to Firebase Realtime Database
            const payload = {
                phone: phone,
                medicines: meds || "None (Image Uploaded)",
                photoUrl: imageUrl,
                status: "pending",
                timestamp: Date.now()
            };

            const ordersRef = ref(db, 'orders');
            const newOrderRef = push(ordersRef);
            await set(newOrderRef, payload);

            // Shift UI & Start Listening to this specific order!
            document.getElementById('order-panel').classList.add('hidden');
            document.getElementById('tracking-panel').classList.remove('hidden');

            const liveOrderRef = ref(db, `orders/${newOrderRef.key}`);
            onValue(liveOrderRef, (snapshot) => {
                const data = snapshot.val();
                if(data) updateBuyerUI(data.status);
            });
        });

        function updateBuyerUI(status) {
            const banner = document.getElementById('status-banner');
            if (status === 'pending') { banner.innerText = "Order Sent! Waiting for store to accept..."; banner.style.background = "#fef08a"; } 
            else if (status === 'taken') { banner.innerText = "Order Taken! Store is preparing it."; banner.style.background = "#bfdbfe"; } 
            else if (status === 'reached') { banner.innerText = "Order Ready! Kindly collect your order."; banner.style.background = "#fbcfe8"; } 
            else if (status === 'completed') { 
                banner.innerText = "Thanks for purchasing! Keep healthy & get well soon."; 
                banner.style.background = "#bbf7d0"; 
                document.getElementById('new-order-btn').classList.remove('hidden');
            }
        }

        // Theme Toggle
        document.getElementById('theme-btn').addEventListener('click', () => { document.body.dataset.theme = document.body.dataset.theme === "dark" ? "" : "dark"; });
    </script>
</body>
</html>
