<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shree Balaji Medical Store</title>
    <style>
        /* Core Variables & Reset */
        :root { --bg: #f8fafc; --text: #0f172a; --card: #ffffff; --border: #e2e8f0; --primary: #0284c7; }
        [data-theme="dark"] { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --border: #334155; --primary: #38bdf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 30px; width: 100%; max-width: 500px; margin-top: 20px; text-align: center; }
        .hidden { display: none !important; }
        input, button { width: 100%; padding: 14px; border-radius: 8px; font-size: 1rem; margin-bottom: 15px; outline: none; }
        input { border: 2px solid var(--border); background: var(--card); color: var(--text); }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        
        /* Chat UI */
        #chat-box { height: 250px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; background: var(--bg); }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 0.9rem; text-align: left; }
        .msg.buyer { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.seller { background: var(--border); color: var(--text); align-self: flex-start; border-bottom-left-radius: 2px; }
        
        /* Status Banner */
        #status-banner { font-size: 1.2rem; font-weight: bold; padding: 15px; border-radius: 8px; background: #fef08a; color: #854d0e; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header style="width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center;">
        <h1 style="color: var(--primary);">Shree Balaji</h1>
        <button id="theme-btn" style="width: auto; padding: 8px 15px;">🌙</button>
    </header>

    <div id="order-panel" class="card">
        <h2>Place Your Order</h2>
        <input type="tel" id="mobile" placeholder="Mobile Number (+91...)" maxlength="10">
        <input type="text" id="medicines" placeholder="Type medicines here...">
        <p style="margin: 10px 0; color: gray;">- OR -</p>
        <div style="border: 2px dashed var(--border); padding: 20px; border-radius: 8px; margin-bottom: 15px; cursor: pointer;">
            Upload Prescription Image
        </div>
        <button id="submit-btn">Submit Order</button>
    </div>

    <div id="tracking-panel" class="card hidden">
        <div id="status-banner">Status: Pending...</div>
        
        <div id="chat-ui" class="hidden">
            <h3 style="margin-bottom: 10px; text-align: left;">Live Chat with Store</h3>
            <div id="chat-box">
                </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="chat-input" placeholder="Type a message..." style="margin-bottom: 0;">
                <button id="send-btn" style="width: auto; margin-bottom: 0;">Send</button>
            </div>
        </div>
        
        <button id="new-order-btn" class="hidden" style="margin-top: 20px;">Place New Order</button>
    </div>

    <script type="module">
        // TODO: Import Firebase SDK here and initialize (We will do this next)
        
        const ui = {
            orderPanel: document.getElementById('order-panel'),
            trackPanel: document.getElementById('tracking-panel'),
            statusBanner: document.getElementById('status-banner'),
            chatUi: document.getElementById('chat-ui'),
            chatBox: document.getElementById('chat-box'),
            newOrderBtn: document.getElementById('new-order-btn')
        };

        // UI State Machine Trigger
        function updateBuyerUI(status) {
            ui.orderPanel.classList.add('hidden');
            ui.trackPanel.classList.remove('hidden');

            if (status === 'pending') {
                ui.statusBanner.innerText = "Order Sent! Waiting for store to accept...";
                ui.statusBanner.style.background = "#fef08a"; // Yellow
            } 
            else if (status === 'taken') {
                ui.statusBanner.innerText = "Order Taken! Store is preparing it.";
                ui.statusBanner.style.background = "#bfdbfe"; // Blue
                ui.chatUi.classList.remove('hidden'); // Unlock chat
            } 
            else if (status === 'reached') {
                ui.statusBanner.innerText = "Order Ready! Kindly collect your order.";
                ui.statusBanner.style.background = "#fbcfe8"; // Pink
            } 
            else if (status === 'completed') {
                ui.statusBanner.innerText = "Thanks for purchasing! Keep healthy & get well soon.";
                ui.statusBanner.style.background = "#bbf7d0"; // Green
                ui.chatUi.classList.add('hidden');
                ui.newOrderBtn.classList.remove('hidden'); // Allow new order
            }
        }

        // Mock Submission (Will be replaced with Firebase push)
        document.getElementById('submit-btn').addEventListener('click', () => {
            const phone = document.getElementById('mobile').value;
            if(phone.length < 10) return alert("Enter valid number");
            
            // 1. Save to local storage so user doesn't lose it on refresh
            localStorage.setItem("currentOrderId", "MOCK_ID_123");
            
            // 2. Shift UI
            updateBuyerUI('pending');
        });

        // Theme Toggle
        document.getElementById('theme-btn').addEventListener('click', () => {
            document.body.dataset.theme = document.body.dataset.theme === "dark" ? "" : "dark";
        });
    </script>
</body>
</html>
